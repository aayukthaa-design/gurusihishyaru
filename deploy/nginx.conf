# nginx reverse proxy for Guru Shishyaru Tutorials.
#
# Serves the built frontend (dist/) directly as static files, and proxies
# /api and /uploads to the Node backend (run via PM2 — see ecosystem.config.js).
# Rate limiting here is a second layer on top of the application-level limits
# already in server.js (express-rate-limit) — this one protects against
# abuse before it even reaches Node.
#
# Setup on the server:
#   1. Copy this file to /etc/nginx/sites-available/gurushishyaru
#   2. Edit `server_name` and the two `root`/`alias` paths below for your deploy path
#   3. ln -s /etc/nginx/sites-available/gurushishyaru /etc/nginx/sites-enabled/
#   4. Get a cert: certbot --nginx -d your-domain.com  (installs the HTTPS block below automatically)
#   5. nginx -t && systemctl reload nginx

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;

# Redirect all plain HTTP to HTTPS once a certificate is installed (certbot
# will rewrite this block automatically — this is the pre-certbot placeholder).
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # certbot fills these in — placeholders so this file is valid before that runs
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    client_max_body_size 30m; # must be >= the largest multer upload limit in server.js

    # ── Frontend (built SPA) ──────────────────────────────────────────────
    root /var/www/gurushishyaru/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API ────────────────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params_gurushishyaru;
    }

    location /api/auth/parent-login/ {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params_gurushishyaru;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params_gurushishyaru;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params_gurushishyaru;
    }
}
